<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layouts/base :: head(${producto.nombre})"></head>

<body>

<header th:replace="layouts/base :: cabecera"></header>

<main style="flex: 1; padding: 40px 20px; display: flex; justify-content: center; align-items: center;">

    <section class="producto-single-container" aria-label="Detalles del producto">

        <div class="producto-single-img">
            <div class="badge-descuento-single" th:if="${producto.descuento > 0}" th:text="'-' + ${producto.descuento} + '%'"></div>

            <img th:if="${producto.imagen != null}"
                 th:src="@{/imagenes/{img}(img=${producto.imagen})}"
                 th:alt="'Imagen de ' + ${producto.nombre}">

            <img th:unless="${producto.imagen != null}"
                 th:src="@{/imagenes/categorias/Imagen_Generica.webp}"
                 alt="Imagen no disponible">
        </div>

        <div class="producto-single-info">
            <h1 th:text="${producto.nombre}"></h1>

            <p class="producto-single-marca" th:if="${producto.marca != null}" th:text="'Marca: ' + ${producto.marca}"></p>
            <p class="producto-single-ean" th:text="'EAN: ' + ${producto.codigo}"></p>

            <div class="producto-single-precios">
                <span class="precio-tachado" th:if="${producto.descuento > 0}" th:text="${#numbers.formatDecimal(producto.precio, 1, 2)} + ' €'"></span>
                <span class="precio-final" th:if="${producto.descuento > 0}" th:text="${#numbers.formatDecimal(producto.precio - (producto.precio * producto.descuento / 100.0), 1, 2)} + ' €'"></span>
                <span class="precio-final" th:unless="${producto.descuento > 0}" th:text="${#numbers.formatDecimal(producto.precio, 1, 2)} + ' €'"></span>
            </div>

            <div class="producto-single-stock">
                <span th:if="${producto.stock > 0}" style="color: #5cb85c;">En stock: <span th:text="${producto.stock}"></span> unidades</span>
                <span th:unless="${producto.stock > 0}" style="color: #d9534f;">Agotado temporalmente</span>
            </div>

            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">

            <div class="producto-single-desc">
                <h3>Descripción del producto</h3>
                <p th:text="${producto.descripcion}"></p>
            </div>

            <button class="panel-btn" style="margin-top: 20px; width: 100%;">Añadir al carrito</button>
        </div>

    </section>

</main>

<footer th:replace="layouts/base :: pie"></footer>

</body>
</html>
