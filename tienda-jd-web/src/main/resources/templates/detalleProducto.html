<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head(${producto.nombre})}"></head>
<body class="bg-dark text-light">
<header th:replace="~{layouts/base :: cabecera}"></header>
<main class="productos-contenedor" style="display: flex; justify-content: center;">
    <div class="producto-single-container" th:if="${producto != null}">
        <div class="producto-single-img">
            <div th:if="${producto.descuento > 0}" class="badge-descuento-single" th:text="'-' + ${producto.descuento} + '%'"></div>
            <img th:src="@{'/images/productos/' + ${producto.imagen != null ? producto.imagen : 'default.png'}}"
                 th:alt="'Imagen de ' + ${producto.nombre}">
        </div>
        <div class="producto-single-info">
            <p class="producto-single-marca">
                <a th:href="@{/marcas/{id}(id=${producto.marca.id})}" th:text="${producto.marca.nombre}" style="color: inherit; text-decoration: none;"></a>
            </p>
            <h1 th:text="${producto.nombre}"></h1>
            <p class="producto-single-ean">EAN: <span th:text="${producto.codigo}"></span></p>
            <div class="producto-single-precios">
                <span th:if="${producto.descuento > 0}" class="precio-tachado" th:text="${producto.precio} + '€'"></span>
                <span class="precio-final" th:text="${#numbers.formatDecimal(producto.precio * (1 - producto.descuento/100.0), 1, 2)} + '€'"></span>
            </div>
            <div class="producto-single-desc">
                <h3>Descripción</h3>
                <p th:text="${producto.descripcion}"></p>
            </div>
            <div style="margin-top: 20px;">
                <p th:if="${#lists.size(producto.categorias) == 1}">
                    Categoría: <a th:href="@{/categorias/{id}(id=${producto.categorias[0].id})}" th:text="${producto.categorias[0].nombre}" style="color: #d4af37;"></a>
                </p>
                <ul th:if="${#lists.size(producto.categorias) > 1}" style="list-style: none; padding: 0; display: flex; gap: 10px;">
                    <li th:each="cat : ${producto.categorias}">
                        <a th:href="@{/categorias/{id}(id=${cat.id})}" th:text="${cat.nombre}" style="color: #d4af37; border: 1px solid #d4af37; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem;"></a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{layouts/base :: pie}"></footer>
</body>
</html>
