<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${producto.id == null ? 'Nuevo Producto' : 'Editar Producto'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin"><i class="bi bi-gear-fill me-2"></i>Admin Tienda</a>
    </div>
</nav>

<div class="container" style="max-width: 900px;">
    <div class="card shadow-sm border-0 mb-5">
        <div class="card-header bg-white py-3">
            <h1 class="h4 mb-0" th:text="${producto.id == null ? 'Crear Nuevo Producto' : 'Editar Producto'}"></h1>
        </div>
        <div class="card-body">

            <form th:action="@{${producto.id == null ? '/admin/productos/nueva' : '/admin/productos/' + producto.id + '/edit'}}"
                  method="post" th:object="${producto}">

                <div class="row mb-3">
                    <div class="col-md-3">
                        <label for="codigo" class="form-label fw-bold">Código EAN</label>
                        <input type="text" class="form-control" id="codigo" th:field="*{codigo}">
                    </div>
                    <div class="col-md-9">
                        <label for="nombre" class="form-label fw-bold">Nombre del Producto</label>
                        <input type="text" class="form-control" id="nombre" th:field="*{nombre}">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label for="precio" class="form-label fw-bold">Precio (€)</label>
                        <input type="number" step="0.01" class="form-control" id="precio" th:field="*{precio}">
                    </div>
                    <div class="col-md-4">
                        <label for="descuento" class="form-label fw-bold">Descuento (%)</label>
                        <input type="number" class="form-control" id="descuento" th:field="*{descuento}">
                    </div>
                    <div class="col-md-4">
                        <label for="stock" class="form-label fw-bold">Stock</label>
                        <input type="number" class="form-control" id="stock" th:field="*{stock}">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="descripcion" class="form-label fw-bold">Descripción</label>
                    <textarea class="form-control" id="descripcion" rows="4" th:field="*{descripcion}"></textarea>
                </div>

                <div class="mb-4">
                    <label for="imagen" class="form-label fw-bold">Ruta de la Imagen</label>
                    <input type="text" class="form-control" id="imagen" th:field="*{imagen}">
                </div>

                <hr class="my-4">

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="marca" class="form-label fw-bold">Marca</label>
                        <select class="form-select" id="marca" th:field="*{marca}">
                            <option value="">-- Seleccionar Marca --</option>
                            <option th:each="m : ${listaMarcas}" th:value="${m.id}" th:text="${m.nombre}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Categorías</label>
                        <div class="border rounded p-3 bg-white" style="max-height: 150px; overflow-y: auto;">
                            <div class="form-check" th:each="cat : ${listaCategorias}">
                                <input class="form-check-input" type="checkbox" th:field="*{categorias}" th:value="${cat.id}" th:id="'cat-' + ${cat.id}">
                                <label class="form-check-label" th:for="'cat-' + ${cat.id}" th:text="${cat.nombre}"></label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/admin/productos}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Aceptar</button>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
