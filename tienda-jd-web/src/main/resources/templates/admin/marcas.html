<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Administración de Marcas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin">
            <i class="bi bi-gear-fill me-2"></i>Admin Tienda
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="/admin/marcas">Marcas</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/productos">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin/categorias">Categorías</a></li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Volver a la tienda</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Gestión de Marcas</h1>
        <a th:href="@{/admin/marcas/nueva}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i> Nueva Marca
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th scope="col" class="ps-4">ID</th>
                        <th scope="col">Nombre</th>
                        <th scope="col" class="text-end pe-4">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="marca : ${listaMarcas}">
                        <th scope="row" class="ps-4 align-middle" th:text="${marca.id}"></th>
                        <td class="align-middle" th:text="${marca.nombre}"></td>
                        <td class="text-end pe-4 align-middle">
                            <a th:href="@{/admin/marcas/{id}/edit(id=${marca.id})}" class="btn btn-sm btn-outline-primary me-1" aria-label="Editar marca">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                            <a th:href="@{/admin/marcas/{id}/delete(id=${marca.id})}" class="btn btn-sm btn-outline-danger" aria-label="Eliminar marca">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                    <tfoot th:if="${#lists.isEmpty(listaMarcas)}">
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">No hay marcas registradas.</td>
                    </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
