<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${categoria.id == null ? 'Nueva Categoría' : 'Editar Categoría'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin"><i class="bi bi-gear-fill me-2"></i>Admin Tienda</a>
    </div>
</nav>

<div class="container" style="max-width: 800px;">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3">
            <h1 class="h4 mb-0" th:text="${categoria.id == null ? 'Crear Nueva Categoría' : 'Editar Categoría'}"></h1>
        </div>
        <div class="card-body">

            <form th:action="@{${categoria.id == null ? '/admin/categorias/nueva' : '/admin/categorias/' + categoria.id + '/edit'}}"
                  method="post" th:object="${categoria}">

                <div class="mb-3">
                    <label for="nombre" class="form-label fw-bold">Nombre de la Categoría</label>
                    <input type="text" class="form-control" id="nombre" th:field="*{nombre}">
                </div>

                <div class="mb-3">
                    <label for="descripcion" class="form-label fw-bold">Descripción</label>
                    <textarea class="form-control" id="descripcion" rows="4" th:field="*{descripcion}"></textarea>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="minimo" class="form-label fw-bold">Mínimo</label>
                        <input type="number" class="form-control" id="minimo" th:field="*{minimo}">
                    </div>
                    <div class="col-md-6">
                        <label for="imagen" class="form-label fw-bold">Ruta de la Imagen</label>
                        <input type="text" class="form-control" id="imagen" th:field="*{imagen}">
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/admin/categorias}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Aceptar</button>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
