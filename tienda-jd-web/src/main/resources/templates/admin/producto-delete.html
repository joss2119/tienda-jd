<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Borrar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin"><i class="bi bi-gear-fill me-2"></i>Admin Tienda</a>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="card shadow-sm border-danger">
        <div class="card-header bg-danger text-white py-3">
            <h1 class="h5 mb-0"><i class="bi bi-exclamation-triangle-fill me-2"></i>Confirmar Eliminación</h1>
        </div>
        <div class="card-body text-center py-5">

            <p class="fs-5 mb-4">
                ¿Seguro que desea borrar el producto <strong><span th:text="${producto.nombre}"></span></strong>?
            </p>

            <form th:action="@{/admin/productos/{id}/delete(id=${producto.id})}" method="post">
                <div class="d-flex justify-content-center gap-3">
                    <a th:href="@{/admin/productos}" class="btn btn-secondary px-4">Cancelar</a>
                    <button type="submit" class="btn btn-danger px-4">Aceptar</button>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
