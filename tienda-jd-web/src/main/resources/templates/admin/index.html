<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin">
            <i class="bi bi-gear-fill me-2"></i>Admin Tienda
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Volver a la tienda</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4">Panel de Control</h1>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center py-5">
                    <i class="bi bi-tags-fill display-1 text-primary mb-3"></i>
                    <h2 class="card-title h4">Marcas</h2>
                    <p class="card-text text-muted">Gestiona las marcas de los productos.</p>
                    <a href="/admin/marcas" class="btn btn-primary mt-3 w-100">Administrar Marcas</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center py-5">
                    <i class="bi bi-box-seam-fill display-1 text-success mb-3"></i>
                    <h2 class="card-title h4">Productos</h2>
                    <p class="card-text text-muted">Añade, edita o elimina productos del catálogo.</p>
                    <a href="/admin/productos" class="btn btn-success mt-3 w-100">Administrar Productos</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center py-5">
                    <i class="bi bi-collection-fill display-1 text-warning mb-3"></i>
                    <h2 class="card-title h4">Categorías</h2>
                    <p class="card-text text-muted">Organiza las categorías de la tienda.</p>
                    <a href="/admin/categorias" class="btn btn-warning mt-3 w-100">Administrar Categorías</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
