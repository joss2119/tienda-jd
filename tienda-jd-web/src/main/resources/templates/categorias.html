<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Categorias</title>
</head>
<body>
    <h1>Lista de Categorias</h1>
    <ul th:each="categoria : ${listaCategorias}">
        <li th:text="${categoria.getNombre()}"></li>
        <li th:text="${categoria.getDescripcion()}"></li>
        <li th:if="${categoria.getImagen() == null}">
            <img th:src="@{/imagenes/categorias/Imagen_Generica.webp}" alt="Imagen no disponible">
        </li>
        <li>
            <a th:href="@{/categorias/{id}(id=${categoria.id})}">Ver detalles</a>
        </li>
    </ul>
    <footer>
        <a href="/sobre-nosotros.html">Sobre Nosotros</a>
    </footer>
</body>
</html>
