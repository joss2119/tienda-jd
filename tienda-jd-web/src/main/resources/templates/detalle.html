<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layouts/base :: head(${categoriaDetallada.nombre})"></head>
<body>
<header th:replace="layouts/base :: cabecera"></header>
<main>
    <section class="categoria-banner" aria-label="Detalles de la categoría"
             th:style="|background-image: linear-gradient(rgba(15, 15, 15, 0.6), rgba(15, 15, 15, 0.95)), url('@{/imagenes/{img}(img=${categoriaDetallada.imagen != null ? categoriaDetallada.imagen : 'categorias/Imagen_Generica.webp'})}');|">
        <h1 th:text="${categoriaDetallada.nombre}"></h1>
        <p th:text="${categoriaDetallada.descripcion}"></p>
    </section>
    <section class="productos-contenedor" aria-label="Productos de la categoría">
        <h2 class="section-title">Productos disponibles</h2>
        <div th:if="${#lists.isEmpty(listaProductos)}" class="empty-state">
            <p>Aún no tenemos productos disponibles para esta categoría.</p>
        </div>
        <div th:unless="${#lists.isEmpty(listaProductos)}" class="productos-grid">
            <div th:replace="~{productos :: listadoProductos}"></div>
        </div>
    </section>
</main>
<footer th:replace="layouts/base :: pie"></footer>
</body>
</html>
