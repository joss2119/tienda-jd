<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layouts/base :: head('Catálogo - Groove & Lens')}"></head>
<body class="bg-dark text-light">
<header th:replace="~{layouts/base :: cabecera}"></header>
<main class="productos-contenedor">
    <h2 class="section-title">Nuestro Catálogo</h2>
    <div th:fragment="listadoProductos" class="productos-grid">
        <div th:each="p : ${listaProductos}" class="producto-card">
            <div th:if="${p.descuento > 0}" class="badge-descuento" th:text="'-' + ${p.descuento} + '%'"></div>
            <div class="producto-img-container">
                <img th:src="@{'/images/productos/' + ${p.imagen != null ? p.imagen : 'default.png'}}"
                     th:alt="${p.imagen != null ? 'Imagen de ' + p.nombre : ''}">
            </div>
            <div class="producto-info">
                <h3>
                    <a th:href="@{/productos/{id}/{nombre}(id=${p.id}, nombre=${p.nombre})}"
                       th:text="${p.nombre}"></a>
                </h3>
                <p class="producto-marca">
                    Marca: <a th:href="@{/marcas/{id}(id=${p.marca.id})}"
                              th:text="${p.marca.nombre}"
                              style="color: #d4af37; text-decoration: none;"></a>
                </p>
                <div class="producto-desc">
                    <p th:if="${#lists.size(p.categorias) == 1}">
                        Categoría: <a th:href="@{/categorias/{id}(id=${p.categorias[0].id})}"
                                      th:text="${p.categorias[0].nombre}"
                                      style="color: #aaa; text-decoration: none;"></a>
                    </p>
                    <ul th:if="${#lists.size(p.categorias) > 1}" style="list-style: none; padding: 0;">
                        <li th:each="cat : ${p.categorias}">
                            <a th:href="@{/categorias/{id}(id=${cat.id})}"
                               th:text="${cat.nombre}"
                               style="color: #aaa; text-decoration: none; font-size: 0.85rem;"></a>
                        </li>
                    </ul>
                </div>
                <div class="producto-precios">
                    <span th:if="${p.descuento > 0}" class="precio-tachado"
                          th:text="${#numbers.formatDecimal(p.precio, 1, 2)} + '€'"></span>
                    <span class="precio-final"
                          th:text="${#numbers.formatDecimal(p.precio * (1 - p.descuento/100.0), 1, 2)} + '€'"></span>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{layouts/base :: pie}"></footer>
</body>
</html>
